services:
  chap:
    platform: linux/amd64
    image: ghcr.io/dhis2-chap/chap-core:${CHAP_CORE_TAG:-latest}
    environment:
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHAP_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CELERY_BROKER: redis://redis:6379/0
      CHAP_LOGS_DIR: /data/logs
      CHAP_RUNS_DIR: /data/runs
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: chap:chap
    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 2000000000
      - type: volume
        source: logs
        target: /data/logs
    ports:
      - "${CHAP_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_started
      worker:
        condition: service_started
      postgres:
        condition: service_healthy

  worker:
    platform: linux/amd64
    image: ghcr.io/dhis2-chap/chap-worker:${CHAP_WORKER_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY}
      IS_IN_DOCKER: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHAP_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CELERY_BROKER: redis://redis:6379
      RENV_PATHS_ROOT: /data/renv
      UV_CACHE_DIR: /data/uv
      CHAP_LOGS_DIR: /data/logs
      CHAP_RUNS_DIR: /data/runs
      PYTENSOR_FLAGS: "base_compiledir=/data/pytensor"
    command: /app/.venv/bin/celery -A chap_core.rest_api.celery_tasks worker --loglevel=info
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: chap:chap
    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 2000000000
      - type: volume
        source: runs
        target: /data/runs
      - type: volume
        source: renv
        target: /data/renv
      - type: volume
        source: uv
        target: /data/uv
      - type: volume
        source: logs
        target: /data/logs
      - type: volume
        source: pytensor
        target: /data/pytensor

  redis:
    image: valkey/valkey:8
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    volumes:
      - chap-db:/var/lib/postgresql/data
    expose:
      - "5432"

volumes:
  chap-db: {}
  logs: {}
  renv: {}
  uv: {}
  pytensor: {}
  runs: {}
